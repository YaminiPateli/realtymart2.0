<main>

    <section class="builders-ahmedabad position-relative">
        <div class="container">
            <div class="banner-small">
                <h1 class="banner_title">Top Builders</h1>
                <p class="banner_small">Top Builders in {{ locationget }}</p>
            </div>
        </div>
    </section>

    <section class="top-explores">
      <div class="container">
          <div class="more-explores">
              <h2 class="explore-head">Localities</h2>
              <div class="explore-tab">
                  <ul class="explore-builders nav-pills mb-3" id="pills-tab" role="tablist">
                      <li class="nav-item" role="presentation" *ngFor="let key of keys">
                          <button class="explore-link"
                              [class.active]="activeLocality === key"
                              id="pills-{{ key }}-tab"
                              data-bs-toggle="pill"
                              [attr.data-bs-target]="'#pills-' + key"
                              type="button"
                              role="tab"
                              [attr.aria-controls]="'pills-' + key"
                              [attr.aria-selected]="activeLocality === key"
                              (click)="setActiveLocality(key)">
                              {{ key }}
                          </button>
                      </li>
                  </ul>
                  <div class="tab-content" id="pills-tabContent">
                    <div class="tab-pane fade show active" id="pills-sg" role="tabpanel" [attr.aria-labelledby]="'pills-' + activeLocality + '-tab'">
                        <div class="builders-localities">
                          <div class="explore-front" *ngFor="let topbuilder of topbuilders[activeLocality]">
                            <!-- Use the safe navigation operator to avoid errors -->
                            <ng-container *ngIf="topbuilder">
                              <div class="builder-logos">
                                <img [src]="topbuilder.builder_logo" alt="" class="img-fluid">
                              </div>
                              <div class="builder-details">
                                <h4 class="explore-top">{{ topbuilder.name }}</h4>
                                <p class="build-sells">Ongoing <span class="items-building">{{ topbuilder.total_projects - topbuilder.completed_projects }}</span></p>
                                <p class="build-sells">Past <span class="items-building">{{ topbuilder.completed_projects }}</span></p>
                              </div>
                              <div>
                                <a routerLink="/builder-detail/{{ topbuilder.builderUrl }}" class="explore-inner">
                                  <i class="fa fa-thin fa-chevron-right" style="color: #ffffff"></i>
                                </a>
                              </div>
                            </ng-container>
                          </div>
                        </div>
                      </div>

                      <!-- Add tab-pane sections for other localities as needed -->
                  </div>
              </div>
          </div>
          <div class="all-builder-btn">
              <a routerLink="/builder-listing/{{ locationget }}">VIEW ALL BUILDERS IN {{ locationget }}</a>
          </div>
      </div>
  </section>


    </main>
